  date: 2026-05-15
  notes: >-
    11 parallel claude/festive-lamport-* branches each attempted the pivot from
    stock screener to workflow engine. Build-tested top 3 full-MVP candidates;
    UpQWO won (widest API surface, no deprecation warnings, best docs). main
    fast-forwarded to it and pushed. Pre-pivot stock-screener roadmap work is in
    git stash 'stock-screener-roadmap-shelved-2026-05-15'. Other 10 branches
    still on origin pending a delete/archive decision.
  verified: "build green; e2e smoke — login, template list, workflow create, step approve, audit log all pass"

deployment:
  platform: Railway
  project: halalflow (fa7e3052-3b82-40f0-b85d-54747445d973)
  service: halalflow (existing service, redeployed 2026-05-15)
  url: https://halalflow-production.up.railway.app
  database: SQLite on Railway volume 'halalflow-volume' mounted at /data (DATABASE_URL=file:/data/dev.db)
  notes: >-
    package.json wired for Railway — postinstall runs prisma generate, start runs
    prisma migrate deploy before next start. Prod DB seeded once via 'railway ssh
    npx prisma db seed'. Live e2e smoke (login, workflow create, step approve,
    dashboard) all pass.
  follow_ups:
    - "SQLite is single-writer; migrate to Postgres before real concurrent load"
    - "Demo creds admin@halalflow.app / changeme123 are seeded in prod — rotate or gate before sharing publicly"

landing_page:
  date: 2026-05-15
  status: live
  spec: docs/superpowers/specs/2026-05-15-landing-page-design.md
  notes: >-
    Public marketing landing page at / for anonymous visitors (was a redirect to
    /login). Logged-in users still redirect to /dashboard. Direction B —
    emerald hero with Islamic geometric motif, asymmetric split, zig-zag
    use-case grid, connected stepper. Built under taste-skill (variance 8 /
    motion 6 / density 4): CSS-only motion, zero new dependencies. Components
    in src/components/landing/; Navbar.tsx has a public header branch for /.
    Verified live: / 200 anon, 307->/dashboard logged-in, /login + /register
    unaffected.
  iterate_next:
    - "Hero/CTA are contained (max-w-screen-xl) not full-bleed — by design, given the global layout <main> wrapper; revisit if full-bleed wanted"

